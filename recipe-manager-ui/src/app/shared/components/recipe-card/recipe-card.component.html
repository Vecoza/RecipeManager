<div class="card">
  <div class="card-header">
    <div class="card-meta">
      @for (tag of recipe.tags.slice(0, 2); track tag.id) {
        <span class="tag">{{ tag.name }}</span>
      }
      @if (recipe.tags.length > 2) {
        <span class="tag tag-more">+{{ recipe.tags.length - 2 }}</span>
      }
    </div>
    <button class="delete-btn" (click)="onDelete()">
      <mat-icon>delete_outline</mat-icon>
    </button>
  </div>

  <a class="card-body" [routerLink]="['/recipes', recipe.id]">
    <h3 class="card-title">{{ recipe.title }}</h3>
    @if (recipe.description) {
      <p class="card-desc">{{ recipe.description }}</p>
    }
  </a>

  <div class="card-footer">
    <span class="stat">{{ totalTime }}m</span>
    <span class="stat-sep">·</span>
    <span class="stat">{{ recipe.servings }} servings</span>
    <a class="edit-btn" [routerLink]="['/recipes', recipe.id, 'edit']">
      <mat-icon>edit</mat-icon>
    </a>
  </div>
</div>
